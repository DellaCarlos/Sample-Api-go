services:
  go-sample:
    container_name: go-sample
    image: samplelims-api
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - go_sample_db
  go_sample_db:
    container_name: go_sample_db
    image: postgres:12
    environment:
      POSTGRES_PASSWORD: 1234
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: {}